services:
  - type: web
    name: sentence-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANALYZER_PROVIDER
        value: mock
      - key: ALLOWED_ORIGINS
        sync: false
